name: Release Container Images

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      APP_DATABASE_PATH: ${{ runner.temp }}/release-validation.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --requirement backend/requirements.txt
      - run: cd backend && python -m unittest discover -p 'test_*.py'
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd frontend && npm ci && npm run build

  publish:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: backend
            image: ghcr.io/hkjoker-z/personal-job-agent-backend
            dockerfile: backend/Dockerfile
          - component: frontend
            image: ghcr.io/hkjoker-z/personal-job-agent-frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ github.ref_name }}
            type=sha
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
