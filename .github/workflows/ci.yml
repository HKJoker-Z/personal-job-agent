name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      APP_DATABASE_PATH: /tmp/personal-job-agent-ci.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --requirement requirements.txt
      - name: Compile Python
        run: python -m compileall -q . ../scripts
      - name: Run regression tests
        run: python -m unittest discover -v
      - name: Confirm default database was not created
        run: test ! -e data/app.db

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run build

  backend-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.9-alpine
        env:
          POSTGRES_DB: personal_job_agent_ci_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_test_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d personal_job_agent_ci_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      PJA_RUN_POSTGRES_TESTS: "1"
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres_test_only@127.0.0.1:5432/personal_job_agent_ci_test
      DATABASE_URL: postgresql+psycopg://postgres:postgres_test_only@127.0.0.1:5432/personal_job_agent_ci_test
      FILE_STORAGE_ROOT: /tmp/pja-v2-ci-files
      SESSION_COOKIE_SECURE: "false"
      AUTH_TRUSTED_ORIGINS: http://testserver
      AUTH_FINGERPRINT_KEY: TEST_ONLY_CI_FINGERPRINT_KEY_32_BYTES
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --requirement requirements.txt
      - run: python -m unittest -v test_v2_postgres_integration.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build --file backend/Dockerfile --tag personal-job-agent-backend:local .
      - run: docker build --file frontend/Dockerfile --tag personal-job-agent-frontend:local .
      - run: scripts/verify-images.sh personal-job-agent-backend:local personal-job-agent-frontend:local

  docker-smoke:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/docker-smoke.sh

  docker-smoke-v2:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install 'psycopg[binary]==3.3.4'
      - name: Ensure PostgreSQL client tools
        run: command -v pg_dump >/dev/null && command -v pg_restore >/dev/null || (sudo apt-get update && sudo apt-get install -y postgresql-client)
      - run: PYTHON_BIN="$(command -v python)" scripts/docker-smoke-v2.sh

  compose-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create non-secret CI configuration
        run: |
          env_file="${RUNNER_TEMP}/personal-job-agent.env"
          {
            printf '%s=%s\n' 'DEEPSEEK_API_KEY' 'TEST_ONLY_CI_VALUE'
            echo 'APP_ENV=production'
            echo 'POSTGRES_DB=personal_job_agent_ci_test'
            echo 'POSTGRES_BOOTSTRAP_USER=pja_bootstrap'
            echo 'POSTGRES_BOOTSTRAP_PASSWORD=TEST_ONLY_BOOTSTRAP'
            echo 'POSTGRES_MIGRATION_USER=pja_migrate'
            echo 'POSTGRES_MIGRATION_PASSWORD=TEST_ONLY_MIGRATION'
            echo 'POSTGRES_APP_USER=pja_app'
            echo 'POSTGRES_APP_PASSWORD=TEST_ONLY_APPLICATION'
            echo 'SESSION_COOKIE_SECURE=true'
            echo 'AUTH_TRUSTED_ORIGINS=https://example.test'
            echo 'AUTH_FINGERPRINT_KEY=TEST_ONLY_CI_FINGERPRINT_KEY_32_BYTES'
            echo 'PROJECT_KNOWLEDGE_DIR=./runtime/project-knowledge'
            echo 'FILE_STORAGE_DIR=./runtime/files'
            echo 'TRUSTED_HOSTS=localhost'
            echo 'ALLOWED_ORIGINS=http://localhost'
            echo 'ENABLE_API_DOCS=false'
          } > "${env_file}"
          echo "APP_ENV_FILE=${env_file}" >> "${GITHUB_ENV}"
      - run: docker compose --env-file "${APP_ENV_FILE}" config --quiet

  script-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash -n scripts/*.sh

  repository-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject generated or sensitive tracked paths
        run: |
          tracked_bad="$(git ls-files | grep -E '(^|/)\.env($|\.)|\.db$|\.sqlite$|\.sqlite3$|frontend/dist|node_modules|(^|/)runtime/|(^|/)backups/' | grep -v -E '(^|/)\.env\.example$|(^|/)\.env\.production\.example$' || true)"
          if [[ -n "${tracked_bad}" ]]; then
            printf '%s\n' "${tracked_bad}"
            exit 1
          fi
      - name: Reject obvious credentials outside test fixtures
        run: |
          credential_pattern='sk-[A-Za-z0-9_-]{20,}|github_pat_[A-Za-z0-9_]{20,}|ghp_[A-Za-z0-9]{20,}|BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|DEEPSEEK_API_KEY''=.+|MONITORING_ADMIN_TOKEN''=.+'
          if git grep -n -E "${credential_pattern}" -- \
            ':!.env.example' ':!.env.production.example' ':!README.md' ':!docs/' \
            ':!backend/test_security_utils.py' ':!backend/test_safe_prompt.py' \
            ':!backend/evals/cases.json' ':!backend/test_evaluation_service.py'; then
            exit 1
          fi
