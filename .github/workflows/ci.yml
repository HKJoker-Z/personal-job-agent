name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      APP_DATABASE_PATH: /tmp/personal-job-agent-ci.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --requirement requirements.txt
      - name: Compile Python
        run: python -m py_compile *.py
      - name: Run regression tests
        run: |
          python -m unittest test_security_utils.py
          python -m unittest test_safe_prompt.py
          python -m unittest test_agent_workflow.py
          python -m unittest test_recommendation_engine.py
          python -m unittest test_monitoring_service.py
          python -m unittest test_evaluation_service.py
          python -m unittest test_data_management_service.py
          python -m unittest test_database_isolation.py
          python -m unittest test_config.py
          python -m unittest test_readiness.py
          python -m unittest test_logging_utils.py
          python -m unittest test_project_knowledge_config.py
          python -m unittest test_backup_restore.py
      - name: Confirm default database was not created
        run: test ! -e data/app.db

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build --file backend/Dockerfile --tag personal-job-agent-backend:local .
      - run: docker build --file frontend/Dockerfile --tag personal-job-agent-frontend:local .
      - run: scripts/verify-images.sh personal-job-agent-backend:local personal-job-agent-frontend:local

  docker-smoke:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/docker-smoke.sh

  compose-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create non-secret CI configuration
        run: |
          env_file="${RUNNER_TEMP}/personal-job-agent.env"
          {
            printf '%s=%s\n' 'DEEPSEEK_API_KEY' 'TEST_ONLY_CI_VALUE'
            echo 'TRUSTED_HOSTS=localhost'
            echo 'ALLOWED_ORIGINS=http://localhost'
            echo 'ENABLE_API_DOCS=false'
          } > "${env_file}"
          echo "APP_ENV_FILE=${env_file}" >> "${GITHUB_ENV}"
      - run: docker compose config --quiet

  script-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash -n scripts/*.sh

  repository-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject generated or sensitive tracked paths
        run: |
          tracked_bad="$(git ls-files | grep -E '(^|/)\.env($|\.)|\.db$|\.sqlite$|\.sqlite3$|frontend/dist|node_modules|(^|/)runtime/|(^|/)backups/' | grep -v -E '(^|/)\.env\.example$|(^|/)\.env\.production\.example$' || true)"
          if [[ -n "${tracked_bad}" ]]; then
            printf '%s\n' "${tracked_bad}"
            exit 1
          fi
      - name: Reject obvious credentials outside test fixtures
        run: |
          credential_pattern='sk-[A-Za-z0-9_-]{20,}|github_pat_[A-Za-z0-9_]{20,}|ghp_[A-Za-z0-9]{20,}|BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|DEEPSEEK_API_KEY''=.+|MONITORING_ADMIN_TOKEN''=.+'
          if git grep -n -E "${credential_pattern}" -- \
            ':!.env.example' ':!.env.production.example' ':!README.md' ':!docs/' \
            ':!backend/test_security_utils.py' ':!backend/test_safe_prompt.py' \
            ':!backend/evals/cases.json' ':!backend/test_evaluation_service.py'; then
            exit 1
          fi
