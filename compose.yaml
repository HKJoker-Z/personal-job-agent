services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      APP_ENV: production
      APP_DATABASE_PATH: /app/data/app.db
      PROJECT_KNOWLEDGE_PATH: /app/project-knowledge/PROJECT_KNOWLEDGE.md
      PROJECT_KNOWLEDGE_SEED_PATH: /app/seed/PROJECT_KNOWLEDGE.md
    expose:
      - "8000"
    volumes:
      - type: bind
        source: ${APP_DATA_DIR:-./runtime/data}
        target: /app/data
      - type: bind
        source: ${PROJECT_KNOWLEDGE_DIR:-./runtime/project-knowledge}
        target: /app/project-knowledge
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "10001:10001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ready', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - application

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "0.0.0.0:${PUBLIC_HTTP_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /var/cache/nginx:size=16m,mode=0755
      - /var/run:size=1m,mode=0755
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - application

networks:
  application:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: pja-br0
