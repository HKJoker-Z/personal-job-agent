services:
  database:
    image: postgres:16.9-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_BOOTSTRAP_USER:?POSTGRES_BOOTSTRAP_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_BOOTSTRAP_PASSWORD:?POSTGRES_BOOTSTRAP_PASSWORD is required}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:?POSTGRES_APP_USER is required}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:?POSTGRES_APP_PASSWORD is required}
      POSTGRES_MIGRATION_USER: ${POSTGRES_MIGRATION_USER:?POSTGRES_MIGRATION_USER is required}
      POSTGRES_MIGRATION_PASSWORD: ${POSTGRES_MIGRATION_PASSWORD:?POSTGRES_MIGRATION_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres/init-roles.sh:/docker-entrypoint-initdb.d/10-init-roles.sh:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    stop_grace_period: 60s
    cpus: "1.00"
    mem_limit: 1g
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - data

  redis:
    image: redis:7.4.1-alpine
    user: "999:1000"
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    stop_grace_period: 30s
    read_only: true
    tmpfs:
      - /data:size=32m,mode=0770,uid=999,gid=1000
      - /tmp:size=8m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cpus: "0.50"
    mem_limit: 320m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - data

  backup-before-migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_MIGRATION_USER}:${POSTGRES_MIGRATION_PASSWORD}@database:5432/${POSTGRES_DB}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      REMEMBER_ME_SESSION_TTL_DAYS: ${REMEMBER_ME_SESSION_TTL_DAYS:-30}
      AUTH_TRUSTED_ORIGINS: ${AUTH_TRUSTED_ORIGINS:-}
      AUTH_FINGERPRINT_KEY: ${AUTH_FINGERPRINT_KEY:-}
      REDIS_URL: redis://redis:6379/0
      FILE_STORAGE_ROOT: /app/runtime/files
    command: ["python", "/app/scripts/v2_backup_restore.py", "backup", "--database-url-env", "DATABASE_URL", "--backup-dir", "/backup", "--files-root", "/app/runtime/files", "--project-knowledge", "/app/project-knowledge/PROJECT_KNOWLEDGE.md"]
    volumes:
      - type: bind
        source: ${BACKUP_DIR:-./runtime/backups}
        target: /backup
      - type: bind
        source: ${FILE_STORAGE_DIR:-./runtime/files}
        target: /app/runtime/files
        read_only: true
      - type: bind
        source: ${PROJECT_KNOWLEDGE_DIR:-./runtime/project-knowledge}
        target: /app/project-knowledge
        read_only: true
    depends_on:
      database:
        condition: service_healthy
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "10001:10001"
    cpus: "1.00"
    mem_limit: 512m
    networks:
      - data

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_MIGRATION_USER}:${POSTGRES_MIGRATION_PASSWORD}@database:5432/${POSTGRES_DB}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      REMEMBER_ME_SESSION_TTL_DAYS: ${REMEMBER_ME_SESSION_TTL_DAYS:-30}
      AUTH_TRUSTED_ORIGINS: ${AUTH_TRUSTED_ORIGINS:-}
      AUTH_FINGERPRINT_KEY: ${AUTH_FINGERPRINT_KEY:-}
      FILE_STORAGE_ROOT: /app/runtime/files
      REDIS_URL: redis://redis:6379/0
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
    depends_on:
      database:
        condition: service_healthy
      backup-before-migrate:
        condition: service_completed_successfully
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "10001:10001"
    networks:
      - data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_VERSION: ${APP_VERSION:-2.0.1}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@database:5432/${POSTGRES_DB}
      PROJECT_KNOWLEDGE_PATH: /app/project-knowledge/PROJECT_KNOWLEDGE.md
      PROJECT_KNOWLEDGE_SEED_PATH: /app/seed/PROJECT_KNOWLEDGE.md
      FILE_STORAGE_ROOT: /app/runtime/files
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      REMEMBER_ME_SESSION_TTL_DAYS: ${REMEMBER_ME_SESSION_TTL_DAYS:-30}
      AUTH_TRUSTED_ORIGINS: ${AUTH_TRUSTED_ORIGINS:-}
      AUTH_FINGERPRINT_KEY: ${AUTH_FINGERPRINT_KEY:-}
      REDIS_URL: redis://redis:6379/0
    expose:
      - "8000"
    volumes:
      - type: bind
        source: ${PROJECT_KNOWLEDGE_DIR:-./runtime/project-knowledge}
        target: /app/project-knowledge
      - type: bind
        source: ${FILE_STORAGE_DIR:-./runtime/files}
        target: /app/runtime/files
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      worker:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "10001:10001"
    cpus: "1.00"
    mem_limit: 768m
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ready', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      application:
        aliases:
          - backend-v2
      data: {}

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_VERSION: ${APP_VERSION:-2.0.1}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@database:5432/${POSTGRES_DB}
      FILE_STORAGE_ROOT: /app/runtime/files
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      REMEMBER_ME_SESSION_TTL_DAYS: ${REMEMBER_ME_SESSION_TTL_DAYS:-30}
      AUTH_TRUSTED_ORIGINS: ${AUTH_TRUSTED_ORIGINS:-}
      AUTH_FINGERPRINT_KEY: ${AUTH_FINGERPRINT_KEY:-}
      REDIS_URL: redis://redis:6379/0
      AGENT_WORKER_ID: worker-primary
      AGENT_WORKER_CONCURRENCY: ${AGENT_WORKER_CONCURRENCY:-4}
    command: ["python", "-m", "app.agent_runs.worker"]
    volumes:
      - type: bind
        source: ${FILE_STORAGE_DIR:-./runtime/files}
        target: /app/runtime/files
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "10001:10001"
    cpus: "2.00"
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "python", "-m", "app.agent_runs.healthcheck"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 6
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - application
      - data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${PUBLIC_HTTP_BIND:-0.0.0.0}:${PUBLIC_HTTP_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=0700,uid=101,gid=101
      - /tmp/client_temp:size=8m,mode=0700,uid=101,gid=101
      - /tmp/proxy_temp:size=8m,mode=0700,uid=101,gid=101
      - /tmp/fastcgi_temp:size=1m,mode=0700,uid=101,gid=101
      - /tmp/uwsgi_temp:size=1m,mode=0700,uid=101,gid=101
      - /tmp/scgi_temp:size=1m,mode=0700,uid=101,gid=101
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cpus: "0.50"
    mem_limit: 256m
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    user: "101:101"
    networks:
      application:
        aliases:
          - frontend-v2

networks:
  application:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: ${APPLICATION_BRIDGE_NAME:-pja-br0}
  data:
    driver: bridge
    internal: true

volumes:
  postgres-data:
