pid /tmp/nginx.pid;
worker_processes auto;
events { worker_connections 512; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    access_log off;
    error_log /dev/stderr warn;
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;
    map $http_x_request_id $upstream_request_id { default $http_x_request_id; "" $request_id; }
    server {
        listen 8080 ssl;
        server_name _;
        ssl_certificate /run/pja-tls/fullchain.pem;
        ssl_certificate_key /run/pja-tls/privkey.pem;
        ssl_trusted_certificate /run/pja-tls/chain.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_tickets off;
        client_max_body_size 8m;
        add_header Strict-Transport-Security "max-age=31536000" always;
        location = /healthz { access_log off; default_type text/plain; return 200 "ok\n"; }
        location / {
            proxy_pass http://frontend-v2:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $upstream_request_id;
            proxy_read_timeout 3600s;
            proxy_buffering off;
        }
    }
}
